name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x] # Permet de tester l'API sur plusieurs versions LTS de Node

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Installation des dépendances
        run: npm ci

      - name: Exécution des tests
        run: npm run test:ci
        env:
          # Les variables d'environnement de ton .env.example peuvent être définies ici si besoin.
          NODE_ENV: test
          ENCRYPTION_KEY: "une-clef-secrete-bidon-de-32-caracteres"
          ENCRYPTION_IV: "un-iv-secret-bidon-16-car"
          PHONE_KEY: "clef-phone-bidon"
          STRIPE_SECRET_KEY: "sk_test_clef_bidon_pour_les_tests"
